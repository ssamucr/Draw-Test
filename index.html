<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto de Partículas en Imagen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1628;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            max-width: 100%;
            max-height: 100vh;
            cursor: default;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            color: white;
        }

        .controls input {
            width: 100%;
            margin: 10px 0;
        }

        .controls label {
            display: block;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Controles</h3>
        <label>Tamaño de partícula: <span id="sizeValue">2</span></label>
        <input type="range" id="particleSize" min="1" max="5" value="2" step="0.5">
        
        <label>Espaciado: <span id="gapValue">6</span></label>
        <input type="range" id="gap" min="1" max="10" value="6" step="1">
        
        <label>Sensibilidad ratón: <span id="mouseValue">50</span></label>
        <input type="range" id="mouseRadius" min="10" max="150" value="50" step="10">
        
        <button id="resetBtn" style="margin-top: 10px; padding: 5px 10px; cursor: pointer;">Resetear</button>
    </div>

    <canvas id="canvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
